name: Deploy to Vercel (Prebuilt)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  Deploy-to-Vercel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 4. Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10.26.2

      - name: 5. Install dependencies
        run: pnpm install

      - name: 6. Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 7. Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 7.5 Debug Env (safe)
        run: |
          set -a && source .vercel/.env.production.local 2>/dev/null; set +a
          echo "AUTH_SSO_PROVIDERS: $( [ -n "${AUTH_SSO_PROVIDERS:-}" ] && echo '<set>' || echo '<not set>' )"
          echo "AUTH_CLOUDFLARE_ZERO_TRUST_ID: $( [ -n "${AUTH_CLOUDFLARE_ZERO_TRUST_ID:-}" ] && echo '<set>' || echo '<not set>' )"
          echo "AUTH_CLOUDFLARE_ZERO_TRUST_SECRET: $( [ -n "${AUTH_CLOUDFLARE_ZERO_TRUST_SECRET:-}" ] && echo '<set>' || echo '<not set>' )"
          echo "AUTH_CLOUDFLARE_ZERO_TRUST_ISSUER: $( [ -n "${AUTH_CLOUDFLARE_ZERO_TRUST_ISSUER:-}" ] && echo '<set>' || echo '<not set>' )"

      - name: 8. Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: 9. Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
